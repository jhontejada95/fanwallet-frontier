<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>FanWallet Logo Export</title>
<style>
  body { background: #0a0e1a; display: flex; flex-wrap: wrap; gap: 32px; padding: 40px; font-family: sans-serif; }
  .item { display: flex; flex-direction: column; align-items: center; gap: 12px; }
  .label { color: #6b7280; font-size: 12px; }
  canvas { display: none; }
</style>
</head>
<body>

<!-- 1024x1024 -->
<div class="item">
  <svg id="logo-1024" width="1024" height="1024" viewBox="0 0 96 96" xmlns="http://www.w3.org/2000/svg">
    <rect x="0" y="0" width="96" height="96" rx="23" fill="#00A651"/>
    <g fill="#0a0e1a">
      <rect x="24" y="20" width="16" height="56"/>
      <path d="M24 20 H72 L66 36 H24 Z"/>
      <path d="M24 42 H58 L53 56 H24 Z"/>
    </g>
    <g transform="translate(64 60)">
      <polygon points="10,0 20,7.5 16,19 4,19 0,7.5" fill="#FFD700"/>
    </g>
  </svg>
  <div class="label">1024×1024 (App Store / Hackathon)</div>
  <button onclick="download('logo-1024', 1024, 'fanwallet-logo-1024.png')">Download 1024×1024 PNG</button>
</div>

<!-- 512x512 -->
<div class="item">
  <svg id="logo-512" width="512" height="512" viewBox="0 0 96 96" xmlns="http://www.w3.org/2000/svg">
    <rect x="0" y="0" width="96" height="96" rx="23" fill="#00A651"/>
    <g fill="#0a0e1a">
      <rect x="24" y="20" width="16" height="56"/>
      <path d="M24 20 H72 L66 36 H24 Z"/>
      <path d="M24 42 H58 L53 56 H24 Z"/>
    </g>
    <g transform="translate(64 60)">
      <polygon points="10,0 20,7.5 16,19 4,19 0,7.5" fill="#FFD700"/>
    </g>
  </svg>
  <div class="label">512×512 (PWA / General)</div>
  <button onclick="download('logo-512', 512, 'fanwallet-logo-512.png')">Download 512×512 PNG</button>
</div>

<!-- 256x256 -->
<div class="item">
  <svg id="logo-256" width="256" height="256" viewBox="0 0 96 96" xmlns="http://www.w3.org/2000/svg">
    <rect x="0" y="0" width="96" height="96" rx="23" fill="#00A651"/>
    <g fill="#0a0e1a">
      <rect x="24" y="20" width="16" height="56"/>
      <path d="M24 20 H72 L66 36 H24 Z"/>
      <path d="M24 42 H58 L53 56 H24 Z"/>
    </g>
    <g transform="translate(64 60)">
      <polygon points="10,0 20,7.5 16,19 4,19 0,7.5" fill="#FFD700"/>
    </g>
  </svg>
  <div class="label">256×256</div>
  <button onclick="download('logo-256', 256, 'fanwallet-logo-256.png')">Download 256×256 PNG</button>
</div>

<!-- Dark background version 1024 -->
<div class="item">
  <svg id="logo-dark" width="512" height="512" viewBox="0 0 96 96" xmlns="http://www.w3.org/2000/svg">
    <rect x="0" y="0" width="96" height="96" rx="23" fill="#131826"/>
    <g fill="#00A651">
      <rect x="24" y="20" width="16" height="56"/>
      <path d="M24 20 H72 L66 36 H24 Z"/>
      <path d="M24 42 H58 L53 56 H24 Z"/>
    </g>
    <g transform="translate(64 60)">
      <polygon points="10,0 20,7.5 16,19 4,19 0,7.5" fill="#FFD700"/>
    </g>
  </svg>
  <div class="label">Dark variant 512×512</div>
  <button onclick="download('logo-dark', 512, 'fanwallet-logo-dark-512.png')">Download Dark 512×512 PNG</button>
</div>

<canvas id="canvas"></canvas>

<script>
function download(svgId, size, filename) {
  const svg = document.getElementById(svgId);
  const canvas = document.getElementById('canvas');
  canvas.width = size;
  canvas.height = size;
  const ctx = canvas.getContext('2d');
  const data = new XMLSerializer().serializeToString(svg);
  const blob = new Blob([data], { type: 'image/svg+xml;charset=utf-8' });
  const url = URL.createObjectURL(blob);
  const img = new Image();
  img.onload = () => {
    ctx.clearRect(0, 0, size, size);
    ctx.drawImage(img, 0, 0, size, size);
    URL.revokeObjectURL(url);
    const a = document.createElement('a');
    a.download = filename;
    a.href = canvas.toDataURL('image/png');
    a.click();
  };
  img.src = url;
}
</script>
</body>
</html>
